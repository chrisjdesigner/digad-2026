<!doctype html>
<html lang="en">
  <head>
    <!-- Meta tags, title, etc. -->
    {{> ad-head-meta.partial }}

    <!-- External CSS (Google Fonts, etc.) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" />

    <!-- Click Tag (populated by ad server) -->
    <script type="text/javascript">
      var clickTag = "";
    </script>

    <!-- CSS Variables (populated from YAML config) -->
    {{> ad-css-variables.partial }}
  </head>

  <body>
    <div id="banner" class="container">
      <a href="javascript:window.open(window.clickTag)">
        <!-- Begin Ad Markup -->

        <!-- Background elements -->
        <div class="background">
          <div class="bg"></div>
        </div>
        
        <!-- Main content area -->
        <div class="content">

          <!-- Headline 1 -->
          {{#if headline-1}}
            <div class="headline">
              {{{headline-1}}}
            </div>
          {{/if}}
          
          <!-- Subhead 1 -->
          {{#if subhead-1}}
            <div class="subhead">
              {{{subhead-1}}}
            </div>
          {{/if}}
        </div>
        
        <!-- Footer, including logo and CTA -->
        <div class="footer">
          <div class="logo"></div>
          {{#if cta}}
            <div class="button">
              <div class="cta">
                {{{cta}}}
              </div>
            </div>
          {{/if}}
        </div>
        
        <!-- End Ad Markup -->
      </a>
    </div>

    <!-- Scripts -->
    {{> ad-scripts.partial }}
  </body>
</html>
