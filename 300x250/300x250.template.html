<!doctype html>
<html lang="en">
  <head>
    <!-- Meta tags, title, etc. -->
    {{> ad-head-meta.partial }}

    <!-- External CSS (Google Fonts, etc.) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" />

    <!-- Click Tag (populated by ad server) -->
    <script type="text/javascript">
      var clickTag = "";
    </script>

    <!-- CSS Variables (populated from YAML config) -->
    {{> ad-css-variables.partial }}
  </head>

  <body>
    <div id="banner" class="container">
      <a href="javascript:window.open(window.clickTag)">

        <!-- Any Background Images -->
        <div class="background">
          <div class="photo"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">

          <!-- Insert This Div Only If headline-1 Var Exists -->
          <!-- (HTML markup is supported in the var) -->
          {{#if headline-1}}
            <div class="headline">
              {{{headline-1}}}
            </div>
          {{/if}}

        </div>

        <!-- Footer with Logo and CTA Button -->
        <div class="footer">
          <div class="logo"></div>

          <!-- Insert This Div Only If cta Var Exists -->
          <!-- (HTML markup is supported in the var) -->
          {{#if cta}}
            <div class="button">
              <div class="cta-text">
                {{{cta}}}
              </div>
            </div>
          {{/if}}

        </div>
        <!-- End Ad Markup -->
      </a>
    </div>

    <!-- Scripts -->
    {{> ad-scripts.partial }}
  </body>
</html>
