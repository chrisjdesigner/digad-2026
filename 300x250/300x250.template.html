<!doctype html>
<html lang="en">
  <head>
    <!-- Meta tags, title, etc. -->
    {{> ad-head-meta.partial }}

    <!-- External CSS (Google Fonts, etc.) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" />

    <!-- Click Tag (populated by ad server) -->
    <script type="text/javascript">
      var clickTag = "";
    </script>

    <!-- CSS Variables (populated from YAML config) -->
    {{> ad-css-variables.partial }}

    <script type="text/javascript">
      window.__delayedHover = {{#if delayedHover}}true{{else}}false{{/if}};
    </script>
  </head>

  <body>
    <div id="banner" class="container">
      <a href="javascript:window.open(window.clickTag)">

        <!-- Any Background Images -->
        <div class="background">
          <div class="photo"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
          <div class="headline">
            {{headline-1}}
          </div>
        </div>

        <!-- Footer with Logo and CTA Button -->
        <div class="footer">
          <div class="logo"></div>
          <div class="button">
            <div class="cta-text">
              {{cta}}
            </div>
          </div>
        </div>
        <!-- End Ad Markup -->

      </a>
    </div>

    <!-- Scripts -->
    {{> ad-scripts.partial }}
  </body>
</html>
