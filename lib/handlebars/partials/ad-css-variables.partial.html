  <style>
    :root {
      /* Width and height auto-generated */
      --ad-width: {{width}}px;
      --ad-height: {{height}}px;

      /* Automatically generated CSS variables from YAML config */
      {{#each css-variables}}
      {{#each this}}
      --{{@../key}}-{{@key}}: {{this}};
      {{/each}}
      {{/each}}
    }
  </style>
  <script type="text/javascript">
    window.__delayedHover = {{#if delayedHover}}true{{else}}false{{/if}};
  </script>
